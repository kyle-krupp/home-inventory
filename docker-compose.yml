services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: home_inventory
      POSTGRES_USER: home_inventory
      POSTGRES_PASSWORD: home_inventory
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U home_inventory -d home_inventory
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
