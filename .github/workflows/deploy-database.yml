name: deploy-database

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  deploy-db:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate



      - name: Debug DB connectivity
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          set -euo pipefail
          
          # extract host and port from DATABASE_URL (simple heuristic)
          host=$(echo "$DATABASE_URL" | sed -E 's#.*@([^:/]+).*#\1#')
          port=$(echo "$DATABASE_URL" | sed -E 's#.*:([0-9]+)/.*#\1#' || echo 5432)
          
          echo "Testing connectivity to host: $host port: $port"
          
          # DNS resolution
          apt-get update -y
          apt-get install -y dnsutils netcat-openbsd postgresql-client
          
          echo "nslookup:"
          nslookup "$host" || true
          
          echo "TCP check with nc:"
          nc -vz -w 5 "$host" "$port" || echo "nc failed to connect"
          
          # quick psql test (PGPASSWORD set from URL)
          # This extracts the username/password/database naively; if your password contains special chars,
          # this will fail — you should URL-encode the password instead.
          user=$(echo "$DATABASE_URL" | sed -E 's#postgresql://([^:]+):.*#\1#; s#postgres://([^:]+):.*#\1#')
          pass=$(echo "$DATABASE_URL" | sed -E 's#.*://[^:]+:([^@]+)@.*#\1#')
          dbname=$(echo "$DATABASE_URL" | sed -E 's#.*@[^:/]+:[0-9]+/([^?]+).*#\1#')
          
          echo "Attempting psql connection (user: $user db: $dbname)..."
          export PGPASSWORD="$pass"
          psql -h "$host" -U "$user" -d "$dbname" -c '\conninfo' || echo "psql connection failed"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: npm run db:migrate:deploy
