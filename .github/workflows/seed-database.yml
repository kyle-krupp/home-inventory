name: Seed Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Seed database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: npm run db:seed

      - name: Notify completion
        run: echo "✅ Database seeding completed for ${{ inputs.environment }}"
